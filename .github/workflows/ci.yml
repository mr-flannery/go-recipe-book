name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prepare:
    name: Prepare Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create config.yaml from template
        env:
          MAIL_DOMAIN: ${{ secrets.MAIL_DOMAIN }}
          MAIL_API_KEY: ${{ secrets.MAIL_API_KEY }}
        run: |
          sed -e "s|\${MAIL_DOMAIN}|${MAIL_DOMAIN}|g" \
              -e "s|\${MAIL_API_KEY}|${MAIL_API_KEY}|g" \
              config.yaml.tmpl > config.yaml

      - name: Upload config.yaml
        uses: actions/upload-artifact@v4
        with:
          name: config
          path: config.yaml
          retention-days: 1

  unit-and-integration-tests:
    name: All Tests (unit and integration) with Coverage
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4

      - name: Download config.yaml
        uses: actions/download-artifact@v4
        with:
          name: config

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run all tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  browser-tests:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-and-integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Download config.yaml
        uses: actions/download-artifact@v4
        with:
          name: config

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright dependencies
        working-directory: browser-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium firefox webkit

      - name: Start services with Docker Compose
        env:
          MAIL_DOMAIN: ${{ secrets.MAIL_DOMAIN }}
          MAIL_API_KEY: ${{ secrets.MAIL_API_KEY }}
        run: docker compose --profile ci up -d --build

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 10
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:8080/api/health || exit 1

      - name: Run Playwright tests
        working-directory: browser-tests
        env:
          BROWSER_TEST_MODE: full
        run: npx playwright test

      - name: Stop services
        if: always()
        run: docker compose --profile ci down

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [browser-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set Railway environment variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set_variables() {
            railway variables set --skip-deploys MAIL_API_KEY="${{ secrets.MAIL_API_KEY }}" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys MAIL_DOMAIN="${{ secrets.MAIL_DOMAIN }}" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys DB_ADMIN_USERNAME="${{ secrets.INITIAL_ADMIN_USERNAME }}" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys DB_ADMIN_EMAIL="${{ secrets.INITIAL_ADMIN_EMAIL }}" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys DB_ADMIN_PASSWORD="${{ secrets.INITIAL_ADMIN_PASSWORD }}" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys OTEL_SERVICE_NAME="recipe-book" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys OTEL_EXPORTER_OTLP_PROTOCOL="http/protobuf" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys OTEL_EXPORTER_OTLP_ENDPOINT="https://api.eu1.honeycomb.io" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys OTEL_EXPORTER_OTLP_HEADERS="x-honeycomb-team=${{ secrets.HONEYCOMB_API_KEY }}" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys API_ENCRYPTION_KEY="${{ secrets.API_ENCRYPTION_KEY }}" --service ${{ vars.RAILWAY_SERVICE_NAME }} && \
            railway variables set --skip-deploys OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" --service ${{ vars.RAILWAY_SERVICE_NAME }}
          }
          
          MAX_ATTEMPTS=3
          DELAY=10
          
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Setting variables attempt $attempt of $MAX_ATTEMPTS"
            
            if set_variables; then
              echo "Variables set successfully"
              exit 0
            fi
            
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Failed to set variables. Waiting ${DELAY}s before retry..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          
          echo "Failed to set variables after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          MAX_ATTEMPTS=5
          DELAY=60
          
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Deployment attempt $attempt of $MAX_ATTEMPTS"
            
            if output=$(railway up --verbose --service ${{ vars.RAILWAY_SERVICE_NAME }} 2>&1); then
              echo "Deployment successful"
              echo "$output"
              exit 0
            fi
            
            exit_code=$?
            echo "Deployment failed (exit code: $exit_code)"
            echo "Output:"
            echo "$output"
            
            if echo "$output" | grep -qi "rate limit"; then
              if [ $attempt -lt $MAX_ATTEMPTS ]; then
                echo "Rate limited. Waiting ${DELAY}s before retry..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
                if [ $DELAY -gt 480 ]; then
                  DELAY=480
                fi
              else
                echo "Max retry attempts reached"
                exit 1
              fi
            else
              echo "Non-rate-limit error, failing immediately"
              exit 1
            fi
          done
          
          echo "Deployment failed after $MAX_ATTEMPTS attempts"
          exit 1
