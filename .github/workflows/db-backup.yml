name: Database Backup

on:
  # schedule:
  #   - cron: "0 3 * * *" # Daily at 3 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    name: Backup PostgreSQL Database
    runs-on: ubuntu-latest
    steps:
      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FILENAME="backup-$(date +%Y%m%d-%H%M%S).sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.BACKUP_AWS_REGION || 'eu-central-1' }}
          S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
        run: |
          aws s3 cp "$FILENAME" "s3://${S3_BUCKET}/db-backups/$FILENAME"
          echo "Uploaded $FILENAME to s3://${S3_BUCKET}/db-backups/"
